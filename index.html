<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Intro to MapView - Create a 2D map</title>
<style>
  html, body, #viewDiv {
    padding: 0;
    margin: 0;
    height: 100%;
    width: 100%;
  }
</style>
<link rel="stylesheet" href="https://js.arcgis.com/4.6/esri/css/main.css">
<script src="https://js.arcgis.com/4.6/"></script>
<script>
require([
  "esri/Map",
  "esri/layers/TileLayer",  // Require the TileLayer module
  "esri/views/MapView",
  "dojo/domReady!"
], function(Map, TileLayer, MapView){
  
  var utah_layer = new TileLayer({
      url: "http://geoserver2.byu.edu/arcgis/rest/services/sherry/UtahCountyshp/MapServer"
    });
	var map = new Map({
    basemap: "streets",
	layers:[utah_layer]
  });
  
  map.layers.add(utah_layer);
	
  var view = new MapView({
    container: "viewDiv", 
    map: map
  });
});
</script>
</head>
<body>
  <div id="viewDiv"></div>
</body>
</html>
