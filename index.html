<!DOCTYPE html>
<html>
<head>
  <title>Demo</title>
  <style>
  html, body, #mapDiv {
	padding: 0;
	margin: 0;
	height: 100%;
	}
  </style>
  <link rel="stylesheet" href="https://js.arcgis.com/3.23/esri/css/esri.css">
  <script src="https://js.arcgis.com/3.23/"></script>
<script>
	require([
	  "esri/map",
	  "esri/layers/ArcGISDynamicMapServiceLayer", 
	  "dojo/domReady!"
	], function(Map, ArcGISDynamicMapServiceLayer){
	  
	  var map = new Map("mapDiv", {
		center: [-111.1, 39.1],
		zoom: 6,
		basemap: "topo"
	  });
	  
	  var utah_shp_layer = new ArcGISDynamicMapServiceLayer("http://geoserver2.byu.edu/arcgis/rest/services/The_SnowMen/Utah_Counties/MapServer", {
	  });
	  
	  var utah_dem_layer = new ArcGISDynamicMapServiceLayer("http://geoserver2.byu.edu/arcgis/rest/services/TeamWon/utah_raster/MapServer", {
	  });
		
	  map.addLayer(utah_shp_layer);
	  map.addLayer(utah_dem_layer);
	  
	});
</script>
</head>
<body>
  <div id="mapDiv"></div>
</body>
</html>
